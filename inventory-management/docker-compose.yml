version: '3.8'

services:
  mysql:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: iv_53895738753
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database-service/MySql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - myappnet

  inventory-management:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=iv_53895738753
    networks:
      - myappnet

networks:
  myappnet:

volumes:
  mysql_data: